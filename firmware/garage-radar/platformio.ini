; Garage mmWave radar firmware for the PlayCanvas splat viewer.
;
; Reads raw HLK-LD2450 frames off UART and streams ALL tracked targets as
; coherent JSON packets over a WebSocket the viewer connects to directly
; (ws://garage-radar.local:81). Replaces the old ESPHome + web_server(SSE) +
; Node bridge path, which only exposed target_1 and deduped/throttled the feed.
;
; Flash:  pio run -t upload          (USB the first time)
;         pio run -t upload          (over-the-air after, see upload_protocol)

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200

lib_deps =
    links2004/WebSockets @ ^2.4.1

; After the first USB flash the device is reachable over OTA. Uncomment these
; (and comment them again if you ever need to fall back to USB) to push wireless:
; upload_protocol = espota
; upload_port = garage-radar.local
